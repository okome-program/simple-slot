<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>slot</title>
    <style>
      html, body {
        touch-action: none;
        margin: 0;
        height: 100%;
        overflow: hidden;
      }

      button {
        user-select: none;
        -webkit-user-select: none;
      }

      body {
        background : #ffff00;
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #game {
        touch-action: none;
        user-select: none;
        -webkit-touch-callout: none;
      }

      #game * {
        user-select: none;
        -webkit-user-select: none;
      }

      .wrapper {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      .virtual {
        position: relative;
        width: calc(100vh * 9 / 16);
        height: 100vh;
        overflow: hidden;
      }

      #obje {
        position: absolute;
        width: 80vw;
        height: 100vh;
        display: flex;
        left: 10%;
        object-fit: cover;
        object-position: center;
        background-color: #0000ff;
      }
      
      #gametitle {
        position: absolute;
        top: 5%;
        left: 50%;
        font-size: 300%;
        color: #000000;
      }
    </style>
  </head>
  <body>
    <div id="game">
      <div class="wrapper">
        <div class="virtual">
          <canvas id="obje"></canvas>
          <h1 id="gametitle">シンプルスロット</h1>
          <button id="startbtn"></button>
        </div>
      </div>
    </div>
  </body>
</html>
