<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>slot</title>
    <style>
      html, body {
        touch-action: none;
        margin: 0;
        height: 100%;
        overflow: hidden;
      }

      button {
        user-select: none;
        -webkit-user-select: none;
      }

      body {
        background : #ffff00;
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #game {
        touch-action: none;
        user-select: none;
        -webkit-touch-callout: none;
      }

      #game * {
        user-select: none;
        -webkit-user-select: none;
      }

      .wrapper {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      .virtual {
        position: relative;
        width: calc(100vh * 9 / 16);
        height: 100vh;
        overflow: hidden;
      }
      
      #gametitle {
        position: absolute;
        top: 5%;
        left: 50%;
        color: #000000;
        transform: translate(-50%, -50%);
      }

      #slot {
        position: absolute;
        top: 30%;
        left: 50%;
        color: rgb(242, 169, 132);
        transform: translate(-50%, -50%);
      }
      #slotborder {
        position: absolute;
        top: 30%;
        left: 50%;
        background-color: #000;
        transform: translate(-50%, -50%);
      }

      #startbtn {
        position: absolute;
        top: 50%;
        left: 80%;
        color: rgb(90, 196, 247);
        border: 0.3% solid #000;
        transform: translate(-50%, -50%) scale(5, 5);
      }
    </style>
  </head>
  <body>
    <div id="game">
      <div class="wrapper">
        <div class="virtual">
          <h1 id="gametitle">シンプルスロット</h1>
          <div id="slot">- 1 - 2 - 3 -</div>
          <div id="slotborder"></div>
          <button id="startbtn">スタート！</button>
          <button id="stopbtn">ストップ</button>
        </div>
      </div>
    </div>
  </body>
</html>
