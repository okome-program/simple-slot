<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>slot</title>
    <style>
      html, body {
        touch-action: none;
        margin: 0;
        height: 100%;
        overflow: hidden;
      }

      button {
        user-select: none;
        -webkit-user-select: none;
      }

      body {
        background : #ffff00;
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #game {
        touch-action: none;
        user-select: none;
        -webkit-touch-callout: none;
      }

      #game * {
        user-select: none;
        -webkit-user-select: none;
      }
      
    </style>
  </head>
  <body>
    <div id="game">
      <h1 id="gametitle">シンプルスロット</h1>
      <button id="startbtn"></button>
    </div>
  </body>
</html>
