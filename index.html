<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <title>slot</title>
    <style>
      html, body {
        touch-action: none;
        margin: 0;
        height: 100%;
        overflow: hidden;
      }

      button {
        user-select: none;
        -webkit-user-select: none;
      }

      body {
        background : #ffff00;
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #game {
        touch-action: none;
        user-select: none;
        -webkit-touch-callout: none;
      }

      #game * {
        user-select: none;
        -webkit-user-select: none;
      }

      .wrapper {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
      }

      .virtual {
        position: relative;
        width: calc(100vh * 9 / 16);
        height: 100vh;
        overflow: hidden;
      }
      
      #gametitle {
        position: absolute;
        width: 90%;
        height: 20%;
        top: 5%;
        left: 50%;
        display: flex;
        font-size: 5vh;
        justify-content: center;
        align-items: center;
        color: #000000;
        transform: translate(-50%, -50%);
      }

      #slot {
        position: absolute;
        height: 18%;
        width: 78%;
        top: 30%;
        left: 50%;
        display: flex;
        font-size: 6vh;
        justify-content: center;
        align-items: center;
        color: rgb(242, 169, 132);
        background-color: #ffffff;
        transform: translate(-50%, -50%);
      }
      #slotborder {
        position: absolute;
        height: 20%;
        width: 80%;
        top: 30%;
        left: 50%;
        background-color: #000000;
        transform: translate(-50%, -50%);
      }

      #startbtn {
        position: absolute;
        height: 15%;
        width: 50%;
        display: flex;
        font-size: 3vh;
        justify-content: center;
        align-items: center;
        top: 70%;
        left: 50%;
        color: rgb(90, 196, 247);
        transform: translate(-50%, -50%);
      }
    </style>
  </head>
  <body>
    <div id="game">
      <div class="wrapper">
        <div class="virtual">
          <h1 id="gametitle">シンプルスロット</h1>
          <div id="slotborder"></div>
          <div id="slot">- 1 - 2 - 3 -</div>
          <button id="startbtn">スタート！</button>
        </div>
      </div>
    </div>
  </body>
  <script>
    const startbtn = document.getElementById("startbtn");
    const slot = document.getElementById("slot");
    
    let a = false;
    let b = 0;
    let s = false;
    let numbera = 0;
    let numberb = 0;
    let numberc = 0;
    startbtn.addEventListener("click", () => {
      if (s == false) {
        s = true;
        b = 0;
        numbera = 0;
        numberb = 0;
        numberc = 0;
      }else if (b < 4) {
        b++;
      }
    });
    
    const FPS = 20;
    const interval = 1000 / FPS;
    let lastTime = 0;

    function loop(time) {
      if(time - lastTime >= interval) {
        if (s == true) {
          startbtn.textContent = "stop";
          if (b < 1) {
            if (numbera == 9) {
              numbera = 0;
            }else {
              numbera++;
            }
          }
          if (b < 2) {
            if (numberb == 9) {
              numberb = 0;
            }else {
              numberb++;
            }
          }
          if (b < 3) {
            if (numberc == 9) {
              numberc = 0;
            }else {
              numberc++;
            }
          }
          slot.textContent = "- " + numbera + " - " + numberb + " - " + numberc + " -";
        }
        lastTime = time;
      }
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</html>
